name: vendor-price-drift

# 月次 vendor 価格ドリフト検知 cron
# 設計: coo/strategic-initiatives/phase1-pod-profit-calculator/
#         vendor-price-drift-cron-design-v1.md
#
# 実行頻度: 毎月 1 日 UTC 00:00 (= JST 09:00)
# fail-soft: scrape 失敗で runner は落ちず、warning Issue だけ立つ

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: vendor-price-drift
  cancel-in-progress: false

jobs:
  drift-check:
    name: Fetch vendor prices and open drift issue if needed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run drift check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Printify は無料アカウントの個人 OAuth トークン (任意)。
          # 未設定時は scrape-broken Issue ではなく "skipped" として扱う。
          PRINTIFY_API_TOKEN: ${{ secrets.PRINTIFY_API_TOKEN }}
        run: pnpm exec tsx scripts/check-vendor-prices.ts
