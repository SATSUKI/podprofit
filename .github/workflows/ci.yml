name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm vitest run

      - name: Build
        run: pnpm build
        env:
          # CI build runs without real env — graceful degradation paths exercise.
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build digital products (Excel template + Benchmark Report PDF)
        # Regenerates dist/products/ to verify the build pipeline still works
        # against the current YAML / fee tables. dist/ is gitignored so we do
        # not commit the artifacts; the unit test guards parity with the
        # runtime calculator. Manual publishing to Lemon Squeezy is a
        # separate, deliberate step run from a maintainer's machine.
        run: pnpm build:products
